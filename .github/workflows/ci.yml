name: CI

# Run on every push and on every pull request.
on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      # Get the repository code onto the runner.
      - name: Checkout
        uses: actions/checkout@v4

      # Install uv, the project's package manager.
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Install Python 3.14 as declared in .python-version.
      - name: Set up Python
        run: uv python install

      # Install all dependencies, including the dev tools (ruff, pytest).
      - name: Install dependencies
        run: uv sync --extra dev

      # Lint: check code style.
      - name: Lint with ruff
        run: uv run ruff check .

      # Test: run the pytest suite.
      - name: Run tests
        run: uv run pytest
