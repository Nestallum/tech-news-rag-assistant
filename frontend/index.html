<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech News RAG Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <div class="app-container" id="appContainer">

        <header class="app-header">
            <div class="brand">Tech News <span class="sub-brand">RAG Assistant</span></div>
        </header>

        <!-- Scrollable conversation area -->
        <main class="chat-area" id="chatArea">
            <div class="conversation-container" id="conversationContainer">
                <div class="message user-message-wrapper">
                    <div class="user-bubble" id="userQuestionText"></div>
                </div>

                <div class="message assistant-message">
                    <div class="avatar assistant-avatar">
                        <span class="material-symbols-rounded">subtitles</span>
                    </div>
                    <div class="message-content">
                        <div id="assistantAnswerText" class="formatted-text"></div>

                        <div id="sourcesContainer" class="sources-container" style="display: none;">
                            <div class="sources-title">SOURCES</div>
                            <div class="sources-list" id="sourcesList"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bottom dock: a stable container.
             In home state it expands to fill the page and vertically
             centers the (welcome title + input). In conversation state
             it collapses to its natural height at the bottom.
             The input box itself never leaves the DOM. -->
        <div class="dock" id="dock">

            <!-- Centered block: welcome title (home only) + input box -->
            <div class="dock-center" id="dockCenter">

                <div class="welcome-screen" id="welcomeScreen">
                    <h1>Caught up on tech news?</h1>
                </div>

                <div class="input-box-positioner">
                    <div class="input-container-box">
                        <div class="prompt-zone">
                            <textarea
                                id="userInput"
                                placeholder="Ask something about latest tech news..."
                                rows="1"
                                maxlength="2000"
                            ></textarea>
                        </div>

                        <div class="options-zone">
                            <div class="left-options"></div>
                            <div class="right-options">
                                <button id="sendBtn" title="Send question">
                                    <span class="material-symbols-rounded">arrow_upward</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <footer class="app-disclaimer-bar">
                <div class="disclaimer">
                    The assistant may display inaccurate info. Please verify important responses.
                </div>
            </footer>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
