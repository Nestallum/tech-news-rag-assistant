<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech News RAG Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
</head>
<body>

    <div class="app-container" id="appContainer">

        <header class="app-header">
            <div class="brand">Tech News <span class="sub-brand">RAG Assistant</span></div>
        </header>

        <!--
            Scrollable conversation area.
            Hidden on the home screen, revealed once the first question is sent
            (via the `has-content` class on .app-container).
        -->
        <main class="chat-area" id="chatArea">
            <div class="conversation-container" id="conversationContainer">
                <div class="message user-message-wrapper">
                    <div class="user-bubble" id="userQuestionText"></div>
                </div>

                <div class="message assistant-message">
                    <div class="avatar assistant-avatar">
                        <span class="material-symbols-rounded">subtitles</span>
                    </div>
                    <div class="message-content">
                        <div id="assistantAnswerText" class="formatted-text"></div>

                        <div id="sourcesContainer" class="sources-container is-hidden">
                            <div class="sources-title">SOURCES</div>
                            <div class="sources-list" id="sourcesList"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!--
            Bottom dock: a stable container that holds the input box at all times.
            On the home screen, the dock fills the page and centers (title + input)
            slightly above the optical middle, mirroring Google's homepage layout.
            Once a question is sent, the dock collapses to its natural height and
            anchors to the bottom of the viewport.
        -->
        <div class="dock" id="dock">
            <div class="dock-center" id="dockCenter">
                <div class="welcome-screen" id="welcomeScreen">
                    <h1>Caught up on tech news?</h1>
                </div>
                <div class="input-box-positioner">
                    <div class="input-container-box">
                        <div class="prompt-zone">
                            <textarea
                                id="userInput"
                                placeholder="Ask something about latest tech news..."
                                rows="1"
                                maxlength="2000"
                            ></textarea>
                        </div>
                        <div class="options-zone">
                            <div class="left-options"></div>
                            <div class="right-options">
                                <button id="sendBtn" title="Send question">
                                    <span class="material-symbols-rounded">arrow_upward</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="app-disclaimer-bar">
            <div class="disclaimer">
                AI can make mistakes. Please verify important information.
            </div>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
