# =============================================================================
# Retrieval stage: query → hybrid (dense + BM25) → rerank → top_k passages
# =============================================================================

retrieval:
  # Phase 1 (initial retrieval): hybrid dense + sparse
  hybrid:
    dense_top_k: 20                    # candidates from ChromaDB dense search
    bm25_top_k: 20                     # candidates from BM25 sparse search
    fusion: reciprocal_rank            # RRF: stable, no hyperparameter to tune
    rrf_k: 60                          # standard RRF constant (Cormack et al., 2009)

  # Phase 2 (reranking): cross-encoder reranker on top of hybrid candidates
  reranker:
    enabled: true
    model: BAAI/bge-reranker-v2-m3
    top_k: 5                           # final number of passages passed to the LLM
    device: auto
    batch_size: 16
