# =============================================================================
# Generation stage: retrieve → threshold guard → prompt → LLM → typed response
# =============================================================================
# Produces grounded answers from retrieved passages, with explicit source
# citations and an anti-hallucination guard. The LLM is served remotely by Groq;
# only non-secret parameters live here — the API key stays in .env.


llm:
  provider: groq
  model: llama-3.3-70b-versatile       # any Groq-hosted model works by name swap
  temperature: 0.1                     # near-deterministic — minimize hallucination in RAG
  max_tokens: 1024
  timeout_s: 30
  max_retries: 2

guard:
  min_retrieval_score: 0.3   # below this top score, skip the LLM and refuse
  refusal_message: >-
    I couldn't find anything relevant in my news sources to answer that.
    This assistant covers recent consumer tech news — try rephrasing, or ask
    about a recent product launch, funding round, or AI development.

multilingual:
  enabled: true
  native_language: en          # the corpus language — never translated
  supported_languages:         # detected and translated to/from native
    - en
    - fr
    - es
    - de
    - zh
  fallback_language: en        # used when detection is uncertain or off-list
