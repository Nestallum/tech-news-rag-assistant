# =============================================================================
# Generation stage: retrieve → threshold guard → prompt → LLM → typed response
# =============================================================================
# Produces grounded answers from retrieved passages, with explicit source
# citations and an anti-hallucination guard. The LLM is served remotely by Cerebras;
# only non-secret parameters live here — the API key stays in .env.


llm:
  provider: cerebras
  model: gpt-oss-120b     # any Cerebras-hosted model works by name swap
  temperature: 0.1                     # near-deterministic — minimize hallucination in RAG
  max_tokens: 1024
  timeout_s: 30
  max_retries: 2

guard:
  min_retrieval_score: 0.5   # below this top score, skip the LLM and refuse
  refusal_message: >-
    I couldn't find anything relevant in my news sources to answer that.
    This assistant covers recent consumer tech news — try rephrasing, or ask
    about a recent product launch, funding round, or AI development.
